[bar/example]
width = 100%
height = 24pt
radius = 0
background = #000000
foreground = #808080
line-size = 0pt
border-size = 0pt
border-color = #000000
padding-left = 1
padding-right = 1
module-margin = 0
separator = " "
separator-foreground = #808080
font-0 = "RobotoMono Nerd Font:size=12:weight=bold;0" 
modules-left = arch-logo xworkspaces xwindow
modules-right = cpu memory pulseaudio battery date systray
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/arch-logo]
type = custom/text
format = <label>
format-background = #000000
format-foreground = #92b3f5
format-padding = 1
label = 󰣇
click-left = rofi -show run -config ~/.config/bspwm/rofi/launcher.rasi

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = #000000
label-active-foreground = #ffffff
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-empty = 
label-empty-padding = 0

[module/xwindow]
type = internal/xwindow
label = %title:0:80:...%
format = <label>
format-foreground = #ffffff

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = #ffffff
label = %percentage%%
label-foreground = #ffffff

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = #ffffff
label = %percentage_used%%
label-foreground = #ffffff

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = " "
format-volume-prefix-foreground = #ffffff
format-volume = <label-volume>
label-volume = %percentage%%
label-volume-foreground = #ffffff
label-muted = 󰝟 %percentage%%
label-muted-foreground = #ffffff

[module/battery]
type = internal/battery
full-at = 100
low-at = 20
battery = BAT1
adapter = ACAD
format-charging = <animation-charging> <label-charging>
format-charging-foreground = #00ff00
label-charging = %percentage%%
ramp-capacity-0 = 󰁺
ramp-capacity-1 = 󰁼
ramp-capacity-2 = 󰁾
ramp-capacity-3 = 󰂁
ramp-capacity-4 = 󰁹
format-discharging = <ramp-capacity> <label-discharging>
format-discharging-foreground = #ffffff
label-discharging = %percentage%%
animation-charging-0 = 󰂆
animation-charging-1 = 󰂈
animation-charging-2 = 󰂉
animation-charging-3 = 󰂊
animation-charging-4 = 󰂅

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d %H:%M %A
label =  %date%
label-foreground = #ffffff

[module/systray]
type = internal/tray

[settings]
screenchange-reload = true
pseudo-transparency = true
