general.import = []
working_directory = "None"
general.live_config_reload = true
general.ipc_socket = true

[env]

[window]
dimensions = { columns = 0, lines = 0 }
position = "None"
padding = { x = 8, y = 8 }
dynamic_padding = false
decorations = "Full"
opacity = 0.9
blur = false
startup_mode = "Windowed"
title = "Alacritty"
dynamic_title = true
class = { instance = "Alacritty", general = "Alacritty" }
decorations_theme_variant = "None"
resize_increments = false
option_as_alt = "None"

[scrolling]
history = 10000
multiplier = 3

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { style = "Bold" }
italic = { style = "Italic" }
bold_italic = { style = "Bold Italic" }
size = 12.00
offset = { x = 0, y = 5 }
glyph_offset = { x = 0, y = 0 }
builtin_box_drawing = true

[colors]
transparent_background_colors = false
draw_bold_text_with_bright_colors = true

[colors.primary]
foreground = "#cdd6f4"
background = "#11111b"
dim_foreground = "#7f849c"
bright_foreground = "#cdd6f4"

[colors.cursor]
text = "#11111b" 
cursor = "#f5e0dc"

[colors.vi_mode_cursor]
text = "#11111b" 
cursor = "#b4befe"

[colors.search.matches]
foreground = "#11111b"
background = "#a6adc8"

[colors.search.focused_match]
foreground = "#11111b"
background = "#a6e3a1"

[colors.hints.start]
foreground = "#11111b"
background = "#f9e2af"

[colors.hints.end]
foreground = "#11111b"
background = "#a6adc8"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#11111b"
background = "#a6adc8"

[colors.selection]
text = "#11111b"
background = "#f5e0dc"

[colors.normal]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"

[colors.bright]
black = "#585b70"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#a6adc8"

[colors.dim]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"

[[colors.indexed_colors]]
index = 16
color = "#fab387"

[[colors.indexed_colors]]
index = 17
color = "#f5e0dc"

[bell]
animation = "EaseOutCubic"
duration = 1
color = "#d8d8d8"
command = "None"

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\\t"
save_to_clipboard = false

[cursor]
style = { shape = "Block", blinking = "Always" }
vi_mode_style = "None"
blink_interval = 500
blink_timeout = 5
unfocused_hollow = true
thickness = 0.20

[terminal]
osc52 = "CopyPaste"
shell = { program = "/bin/zsh", args = ["-l"] }

[mouse]
hide_when_typing = true
bindings = []

[hints]
alphabet = "jfkdls;ahgurieowpq"

[keyboard]
bindings = []
