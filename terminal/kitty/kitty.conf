### Fonts
font_family JetBrainsMono Nerd Font
bold_font JetBrainsMono Nerd Font
italic_font JetBrainsMono Nerd Font
bold_italic_font JetBrainsMono Nerd Font
font_size 12.0
force_ltr no
disable_ligatures never
modify_font cell_height 150%
font_features none
box_drawing_scale 0.001, 1, 1.5, 2
undercurl_style thin-sparse
text_composition_strategy platform
text_fg_override_threshold 0

### Text Cursor Customization
cursor #f5e0dc
cursor_text_color #11111b
cursor_shape block
cursor_shape_unfocused hollow
cursor_beam_thickness 1.5
cursor_underline_thickness 2.0
cursor_blink_interval -1
cursor_stop_blinking_after 0

### Scrollback
scrollback_lines 2000
scrollback_indicator_opacity 1.0
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0
scrollback_fill_enlarged_window no
wheel_scroll_multiplier 5.0
wheel_scroll_min_lines 1
touch_scroll_multiplier 1.0

### Mouse
mouse_hide_wait 3.0
url_color #f5e0dc
url_style curly
open_url_with default
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls yes
show_hyperlink_targets no
underline_hyperlinks hover
copy_on_select no
paste_actions quote-urls-at-prompt,confirm
strip_trailing_spaces never
select_by_word_characters @-./_~?&=%+#
click_interval -1.0
focus_follows_mouse no
pointer_shape_when_grabbed arrow
default_pointer_shape beam
pointer_shape_when_dragging beam
clear_all_mouse_actions no

### Performance Tuning
repaint_delay 10
input_delay 3
sync_to_monitor yes

### Terminal Bell
enable_audio_bell yes
visual_bell_duration 0.0
visual_bell_color #e06c75
window_alert_on_bell yes
bell_on_tab " 🔔 "
command_on_bell none
bell_path none
linux_bell_theme __custom

### Window Layout
remember_window_size no
initial_window_width 640
initial_window_height 400
enabled_layouts *
window_resize_step_cells 2
window_resize_step_lines 2
window_border_width 8px
draw_minimal_borders yes
single_window_margin_width -1
window_padding_width 8
single_window_padding_width -1
placement_strategy center
active_border_color #b4befe
inactive_border_color #6c7086
bell_border_color #f9e2af
inactive_text_alpha 1.0
hide_window_decorations no
window_logo_path none
window_logo_position bottom-right
window_logo_alpha 0.5
window_logo_scale 0
resize_debounce_time 0.1 0.5
resize_in_steps no
visual_window_select_characters 1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ
confirm_os_window_close 0

### Tab Bar
tab_bar_edge top
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_style fade
tab_bar_align left
tab_bar_min_tabs 2
tab_switch_strategy previous
tab_fade 0.25 0.5 0.75 1
tab_separator " ┇ "
tab_powerline_style angled
tab_activity_symbol none
tab_title_max_length 0
tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title}"
active_tab_title_template none
active_tab_foreground #98c379
active_tab_background #1b1f27
active_tab_font_style bold
inactive_tab_foreground #abb2bf
inactive_tab_background #1b1f27
inactive_tab_font_style normal
tab_bar_background #1b1f27
tab_bar_margin_color #1b1f27

### Colorshceme
foreground #cdd6f4
background #11111b
background_opacity 0.95
background_blur 5
background_image none
background_image_layout centered
background_image_linear no
transparent_background_colors red@0.5 #00ff00@0.3
dynamic_background_opacity no
background_tint 0.0
background_tint_gaps 1.0
dim_opacity 0.7
selection_foreground #11111b
selection_background #f5e0dc
color0 #45475a
color1 #f38ba8
color2 #a6e3a1
color3 #f9e2af
color4 #89b4fa
color5 #f5c2e7
color6 #94e2d5
color7 #bac2de
color8 #585b70
color9 #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8
mark1_foreground #11111b
mark1_background #b4befe
mark2_foreground #11111b
mark2_background #cba6f7
mark3_foreground #11111b
mark3_background #74c7ec

### OS tweaks
wayland_titlebar_color #11111b
macos_titlebar_color #11111b
macos_option_as_alt yes
macos_hide_from_tasks no
macos_quit_when_last_window_closed no
macos_window_resizable yes
macos_thicken_font 0
macos_traditional_fullscreen no
macos_show_window_title_in all
macos_menubar_title_max_length 0
macos_custom_beam_cursor no
macos_colorspace srgb
linux_display_server auto
wayland_enable_ime yes
