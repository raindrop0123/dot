general:
  focus_follows_cursor: true
  cursor_follows_focus: true
  toggle_workspace_on_refocus: true
  show_floating_on_top: true
  floating_window_move_amount: "5%"
  center_new_floating_windows: true
  window_animations: "unchanged"

gaps:
  inner_gap: "8px"
  outer_gap: "8px"
  
focus_borders:
  active:
    enabled: true
    color: "#007aff"
  inactive:
    enabled: false
    color: "#808080"

bar:
  height: "24px"
  position: "top"
  opacity: 1.0
  background: "#000000"
  foreground: "#ffffff"
  font_family: "Segoe UI"
  font_size: "12px"
  padding: "0px 0px"
  offset_x: "0"
  offset_y: "0"
  border_radius: "0"
  components_left:
    - type: "workspaces"
      focused_workspace_background: "#007aff"
      displayed_workspace_background: "#808080"
      default_workspace_background: "transparent"
  components_center:
    - type: "window title"
  components_right:
    - type: "cpu"
      label: "[CPU {percent_usage}%]"
      refresh_interval_ms: 1000
    - type: "memory"
      label: "[RAM {percent_usage}%]"
      refresh_interval_ms: 1000
    - type: "battery"
      label_draining: "[BAT {battery_level}%]"
      label_power_saver: "[BAT {battery_level}%]"
      label_charging: "[BAT {battery_level}%]"
    - type: "binding mode"
      background: "#ffffff33"
      margin: "0 4px 0 0"
      padding: "0 8px"
    - type: "clock"
      time_formatting: "[yyyy-MM-dd HH:mm]"
    - type: "system tray"

workspaces:
  - name: "1"
  - name: "2"
  - name: "3"
  - name: "4"
  - name: "5"
  - name: "6"
  - name: "7"
  - name: "8"
  - name: "9"
  - name: "10"

window_rules:
  - command: "ignore"
    match_process_name: "/Taskmgr|ScreenClippingHost/"
  - command: "set floating"
    match_class_name: "#32770"
  - command: "ignore"
    match_title: "[Pp]icture.in.[Pp]icture"
    match_class_name: "Chrome_WidgetWin_1|MozillaDialogClass"
  - command: "resize borders 0px -7px -7px -7px"
    match_process_name: "steam"

keybindings:
  - command: "focus left"
    bindings: ["Alt+K", "Alt+Left"]
  - command: "focus right"
    bindings: ["Alt+J", "Alt+Right"]
  - command: "move left"
    bindings: ["Alt+Shift+K", "Alt+Shift+Left"]
  - command: "move right"
    bindings: ["Alt+Shift+J", "Alt+Shift+Right"]
  - command: "resize width -2%"
    binding: "Alt+H"
  - command: "resize width +2%"
    binding: "Alt+L"
  - command: "focus mode toggle"
    binding: "Alt+Space"
  - command: "toggle floating"
    binding: "Alt+Shift+Space"
  - command: "toggle maximized"
    binding: "Alt+F"
  - command: "close"
    binding: "Alt+Shift+Q"
  - command: "exit wm"
    binding: "Alt+Shift+E"
  - command: "reload config"
    binding: "Alt+Shift+R"
  - command: "exec cmd"
    binding: "Alt+Enter"
  - command: "focus workspace 1"
    binding: "Alt+1"
  - command: "focus workspace 2"
    binding: "Alt+2"
  - command: "focus workspace 3"
    binding: "Alt+3"
  - command: "focus workspace 4"
    binding: "Alt+4"
  - command: "focus workspace 5"
    binding: "Alt+5"
  - command: "focus workspace 6"
    binding: "Alt+6"
  - command: "focus workspace 7"
    binding: "Alt+7"
  - command: "focus workspace 8"
    binding: "Alt+8"
  - command: "focus workspace 9"
    binding: "Alt+9"
  - command: "focus workspace 10"
    binding: "Alt+0"
  - commands: ["move to workspace 1", "focus workspace 1"]
    binding: "Alt+Shift+1"
  - commands: ["move to workspace 2", "focus workspace 2"]
    binding: "Alt+Shift+2"
  - commands: ["move to workspace 3", "focus workspace 3"]
    binding: "Alt+Shift+3"
  - commands: ["move to workspace 4", "focus workspace 4"]
    binding: "Alt+Shift+4"
  - commands: ["move to workspace 5", "focus workspace 5"]
    binding: "Alt+Shift+5"
  - commands: ["move to workspace 6", "focus workspace 6"]
    binding: "Alt+Shift+6"
  - commands: ["move to workspace 7", "focus workspace 7"]
    binding: "Alt+Shift+7"
  - commands: ["move to workspace 8", "focus workspace 8"]
    binding: "Alt+Shift+8"
  - commands: ["move to workspace 9", "focus workspace 9"]
    bindings: ["Alt+Shift+9"]
  - commands: ["move to workspace 10", "focus workspace 10"]
    bindings: ["Alt+Shift+0"]
